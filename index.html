<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UNSC MISSION TERMINAL - HALO 04</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            color: #48fbaf;
        }

        /* Video de fondo de los anillos de Halo */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -2;
            filter: brightness(0.4) contrast(1.2);
        }

        /* Capa de efecto digital/monitor */
        .overlay-fx {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(72, 251, 175, 0.05), rgba(0, 0, 0, 0), rgba(72, 251, 175, 0.05));
            background-size: 100% 4px, 100% 100%;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            padding: 40px;
            height: 100vh;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* HUD - Barra de Escudo */
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .shield-ui {
            text-align: right;
        }

        .shield-bar {
            width: 300px;
            height: 15px;
            border: 2px solid #ffcc00;
            background: rgba(255, 204, 0, 0.1);
            position: relative;
        }

        .shield-fill {
            width: 85%;
            height: 100%;
            background: #ffcc00;
            box-shadow: 0 0 15px #ffcc00;
            animation: flicker 2s infinite;
        }

        /* Cuadros de Información */
        .terminal-box {
            border: 1px solid rgba(72, 251, 175, 0.6);
            background: rgba(0, 20, 20, 0.6);
            backdrop-filter: blur(5px);
            padding: 20px;
            width: 380px;
            box-shadow: 0 0 20px rgba(0, 255, 150, 0.1);
        }

        .stats-grid {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        h2 { border-bottom: 1px solid #48fbaf; margin: 0 0 10px 0; font-size: 18px; color: #a1ffda; }

        /* Botón de Inicio */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #start-btn {
            padding: 20px 50px;
            font-family: 'Share Tech Mono', monospace;
            background: transparent;
            color: #48fbaf;
            border: 2px solid #48fbaf;
            font-size: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        #start-btn:hover {
            background: #48fbaf;
            color: #000;
            box-shadow: 0 0 30px #48fbaf;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .enemy-tag {
            display: inline-block;
            margin-right: 10px;
            border: 1px solid #48fbaf;
            padding: 5px;
            text-align: center;
            width: 100px;
        }
    </style>
</head>
<body>

<div id="start-screen">
    <button id="start-btn" onclick="initSystem()">[ INICIAR PROTOCOLO COLE ]</button>
</div>

<video autoplay muted loop id="bg-video">
    <source src="https://assets.mixkit.co/videos/preview/mixkit-stars-in-the-deep-blue-sky-31842-large.mp4" type="video/mp4">
</video>

<div class="overlay-fx"></div>

<div class="container">
    <header>
        <div>
            <h1 style="margin:0; letter-spacing: 5px;">UNSC // INSTALLATION_04</h1>
            <p id="cortana-text" style="color: #ffcc00; margin: 5px 0;"></p>
        </div>
        <div class="shield-ui">
            <div style="font-size: 12px; margin-bottom: 5px;">SISTEMA DE ESCUDOS MJOLNIR</div>
            <div class="shield-bar"><div class="shield-fill"></div></div>
        </div>
    </header>

    <div class="stats-grid">
        <div class="terminal-box">
            <h2>PERFIL: MASTER CHIEF S-117</h2>
            <p>ESTATURA: 218 CM<br>
               PESO: 451 KG<br>
               ESTADO: ACTIVO EN EL ANILLO<br>
               IA ASIGNADA: CORTANA [CTN 0452-9]</p>
        </div>

        <div class="terminal-box" style="width: 500px;">
            <h2>INTELIGENCIA DE AMENAZAS</h2>
            <div style="display: flex;">
                <div class="enemy-tag">
                    <div style="font-size: 10px;">COVENANT</div>
                    <small>ELITE</small>
                </div>
                <div class="enemy-tag">
                    <div style="font-size: 10px;">COVENANT</div>
                    <small>GRUNT</small>
                </div>
                <div class="enemy-tag" style="border-color: red; color: red;">
                    <div style="font-size: 10px;">PARÁSITO</div>
                    <small>FLOOD</small>
                </div>
            </div>
        </div>
    </div>
</div>

<audio id="halo-theme" loop>
    <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Halo+Theme&filename=mt/MTI1MzM2ODExMjUzNDY2_7lzh_2bR_2f_2bIA.mp3" type="audio/mpeg">
</audio>

<script>
    function initSystem() {
        document.getElementById('start-screen').style.display = 'none';
        
        // Iniciar Música
        const music = document.getElementById('halo-theme');
        music.volume = 0.4;
        music.play();

        // Voz de Cortana (Efecto de escritura)
        let i = 0;
        let txt = 'CORTANA: "Estamos en un anillo... es Halo. Prepárate, Jefe. El Covenant ya está aquí."';
        function typeWriter() {
            if (i < txt.length) {
                document.getElementById("cortana-text").innerHTML += txt.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        typeWriter();
    }
</script>

</body>
</html>
