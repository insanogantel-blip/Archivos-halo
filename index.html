<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>UNSC INTERFACE - INSTALLATION 04</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            /* AQUÍ SE USA TU FOTO COMO FONDO */
            background-image: url('protitipo.jpg'); 
            background-size: cover;
            background-position: center;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            color: #48fbaf;
        }

        /* Capa de escaneo para que parezca un monitor */
        .scanlines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 2px 100%;
            pointer-events: none;
        }

        /* Contenedor Principal Transparente para no tapar el fondo */
        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 10, 15, 0.4); /* Oscurece un poco para leer mejor */
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
        }

        .hud-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(72, 251, 175, 0.5);
            padding-bottom: 10px;
        }

        .shield-box {
            text-align: right;
        }

        .shield-bar {
            width: 200px;
            height: 12px;
            border: 1px solid #ffcc00;
            background: rgba(255, 204, 0, 0.1);
        }

        .shield-fill {
            width: 90%; height: 100%;
            background: #ffcc00;
            box-shadow: 0 0 15px #ffcc00;
        }

        /* Estilo de los cuadros de texto (igual a tu foto) */
        .terminal-window {
            border: 1px solid rgba(72, 251, 175, 0.6);
            background: rgba(0, 25, 25, 0.3);
            backdrop-filter: blur(3px);
            padding: 15px;
            margin-top: 20px;
            width: 350px;
            font-size: 13px;
            line-height: 1.4;
        }

        .master-chief-info {
            position: absolute;
            bottom: 50px;
            right: 400px;
        }

        .enemy-info {
            position: absolute;
            bottom: 50px;
            right: 50px;
            display: flex;
            gap: 20px;
        }

        .enemy-card {
            border: 1px solid #48fbaf;
            background: rgba(0, 20, 20, 0.6);
            width: 150px;
            padding: 10px;
            text-align: center;
        }

        .enemy-card img {
            width: 100%;
            filter: sepia(1) saturate(5) hue-rotate(90deg); /* Efecto holograma verde */
        }

        /* Botón de Inicio para el Sonido */
        #start-btn {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            background: #48fbaf;
            color: #000;
            border: none;
            font-family: 'Share Tech Mono', monospace;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
            box-shadow: 0 0 20px #48fbaf;
        }

        .hidden { display: none; }
        
        h2 { margin: 0 0 10px 0; font-size: 16px; border-bottom: 1px solid #48fbaf; }
    </style>
</head>
<body>

<div class="scanlines"></div>

<button id="start-btn" onclick="startSystem()">INICIAR PROTOCOLO DE TERMINAL</button>

<div class="overlay">
    <div class="hud-header">
        <div>
            <h1 style="margin:0; font-size: 24px;">UNSC_CORE // HALO_04</h1>
            <span id="typing-text"></span>
        </div>
        <div class="shield-box">
            <div style="font-size: 10px; color: #ffcc00;">SISTEMA DE ESCUDOS MJOLNIR</div>
            <div class="shield-bar"><div class="shield-fill"></div></div>
        </div>
    </div>

    <div class="terminal-window">
        <h2 style="color: #ffcc00;">> CORTANA_LOG_2552</h2>
        <p id="cortana-msg"></p>
    </div>

    <div class="terminal-window master-chief-info">
        <h2>MASTER CHIEF - S117</h2>
        <p>EDAD: 41 (BIOLÓGICA)<br>
           ESTATURA: 2.18 METROS<br>
           PESO: 451 KG (FULL GEAR)<br>
           RANGO: SUB-OFICIAL JEFE MAESTRO</p>
    </div>

    <div class="enemy-info">
        <div class="enemy-card">
            <h2>COVENANT</h2>
            <div style="font-size: 10px;">AMENAZA: ALTA</div>
            <p>ELITE / SANGHEILI</p>
        </div>
        <div class="enemy-card">
            <h2>GRUNT</h2>
            <div style="font-size: 10px;">AMENAZA: MEDIA</div>
            <p>UNGGOY / APOYO</p>
        </div>
    </div>
</div>

<div id="youtube-audio" class="hidden"></div>

<script>
    function startSystem() {
        // Ocultar botón
        document.getElementById('start-btn').style.display = 'none';

        // Cargar música de Halo (ID de YouTube del tema original)
        const audio = new Audio('https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptitle=Halo+Theme&filename=mt/MTI1MzM2ODExMjUzNDY2_7lzh_2bR_2f_2bIA.mp3');
        audio.loop = true;
        audio.volume = 0.5;
        audio.play();

        // Efecto de escritura para Cortana
        let i = 0;
        let txt = 'Cortana: "Estamos en un anillo... es Halo. Jefe, prepárese para el contacto Covenant."';
        function typeWriter() {
            if (i < txt.length) {
                document.getElementById("cortana-msg").innerHTML += txt.charAt(i);
                i++;
                setTimeout(typeWriter, 50);
            }
        }
        typeWriter();
    }
</script>

</body>
</html>
